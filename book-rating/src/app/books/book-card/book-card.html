<article class="card mb-4">
  <div class="card-body bg-light">
    <img class="img-thumbnail float-end" alt="Katzenbild"
      src="https://api.angular.schule/avatar/{{ book().rating }}">
    <header class="card-title">
      <h2>{{ book().title }}</h2>
      <app-rating-display [value]="book().rating" />
    </header>
    <p>{{ book().description }}</p>
    <p>Autoren: {{ authors() }}</p>
    <p><strong>Preis:</strong> {{ book().price | currency:'EUR' }}</p>

    <button type="button" class="btn btn-red"
      [disabled]="book().rating <= minRating()"
      aria-label="Bewertung verringern" (click)="doRateDown()"> – </button>
    
    <button type="button" class="btn btn-green"
      [disabled]="book().rating >= maxRating()"
      aria-label="Bewertung erhöhen" (click)="doRateUp()"> + </button>
    
    <button type="button" class="btn btn-yellow" (click)="doDelete()">
      <span aria-hidden="true">🗑️</span>
      Löschen
    </button>

    <button type="button" class="btn btn-red" (click)="doLike()">&#9829; Like</button>

    <a [routerLink]="['/books', book().isbn]">Details</a>

  </div>
</article>
