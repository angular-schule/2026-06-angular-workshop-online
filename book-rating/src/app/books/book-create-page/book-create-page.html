<form>
    <div class="form-group">
        <label for="isbnInput">ISBN</label>
        <input type="text" id="isbnInput" class="form-control"
            [formField]="bookForm.isbn" />
        <p>valid: {{ bookForm.isbn().valid() }}</p>
        
        @if (bookForm.isbn().touched() && bookForm.isbn().invalid()) {
            <ul class="feedback-error">
                @for (e of bookForm.isbn().errors(); track e.kind) {
                    <li>{{ e.message }} ({{ e.kind }})</li>
                }
            </ul>
        }
    </div>

    <div class="form-group">
        <label for="titleInput">Titel</label>
        <input type="text" id="titleInput" class="form-control" [formField]="bookForm.title" />
    </div>

    <div class="form-group">
        <label for="descInput">Beschreibung</label>
        <textarea id="descInput" class="form-control" [formField]="bookForm.description"></textarea>
    </div>

    <div class="form-group">
        <label for="priceInput">Preis</label>
        <input type="number" id="priceInput" class="form-control" [formField]="bookForm.price" />
    </div>

    <div class="form-group">
        <label for="ratingInput">Bewertung</label>
        <input type="number" id="ratingInput" class="form-control" [formField]="bookForm.rating" />
    </div>
</form>

<pre>{{ bookFormData() | json }}</pre>
